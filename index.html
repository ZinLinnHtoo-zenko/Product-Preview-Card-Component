<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <title>Frontend Mentor | Product preview card component</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <figure>
        <div
          class="image-box"
          role="img"
          aria-label="Chanel Paris Perfume"
        ></div>
      </figure>
      <div class="content">
        <p class="upper">Perfume</p>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p class="description">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>

        <div class="container">
          <p class="green-text">$149.99</p>
          <p class="special-text">$169.99</p>
        </div>

        <div class="button">
          <button>
            <img src="images/icon-cart.svg" alt="cart icon" class="cart-icon" />
            Add to Cart
          </button>
        </div>
      </div>
    </main>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by
      <a href="https://www.frontendmentor.io/profile/ZinLinnHtoo-zenko"
        >Zenko</a
      >
    </footer>
  </body>
</html>
